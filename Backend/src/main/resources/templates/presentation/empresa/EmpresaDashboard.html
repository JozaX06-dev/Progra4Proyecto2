<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/Fragmentos :: head('Empresa Dashboard')}"></head>
<body style="background-color:#080f15; min-height:100vh; display:flex; flex-direction:column;">
<nav style="background-color:rgb(35,46,46);">
    <ul class="nav nav-tabs w-100">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/empresa/EmpresaDashboard}">
                <i class="fa-solid fa-briefcase" style="color:rgb(10,202,154)"></i>
            </a>
        </li>
        <li class="nav-item">
            <span class="nav-link fw-bold" style="color:rgb(10,202,154)">Bolsa de Empleo</span>
        </li>
        <li class="nav-item">
            <a class="nav-link active" th:href="@{/empresa/EmpresaDashboard}" style="color:rgb(10,202,154)">Dashboard</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/empresa/MisPuestos}" style="color:rgb(10,202,154)">Mis Puestos</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/empresa/PublicarPuesto}" style="color:rgb(10,202,154)">Publicar Puesto</a>
        </li>
        <li class="nav-item ms-auto">
            <span class="nav-link" th:text="${empresa.nombre}" style="color:rgb(10,202,154)"></span>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/empresa/salir}" style="color:rgb(10,202,154)">Salir</a>
        </li>
    </ul>
</nav>
<main class="flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="my-4 text-center">
        <h3 class="text-white">Empresa - Dashboard</h3>
        <p class="text-white-50">Desde aquí podés administrar tus puestos y buscar candidatos.</p>
        <div class="d-flex gap-3 justify-content-center">
            <a th:href="@{/empresa/MisPuestos}" class="btn px-4"
               style="background-color:rgb(10,202,154); color:#080f15; font-weight:600;">
                Ver mis puestos
            </a>
            <a th:href="@{/empresa/PublicarPuesto}" class="btn px-4"
               style="background-color:rgb(10,202,154); color:#080f15; font-weight:600;">
                Publicar nuevo puesto
            </a>
        </div>
    </div>
</main>
<footer th:replace="~{presentation/Fragmentos :: footer}"></footer>
</body>
</html>
