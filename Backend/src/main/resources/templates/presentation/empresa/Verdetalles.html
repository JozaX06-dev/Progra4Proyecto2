<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/Fragmentos :: head('Ver Detalles')}"></head>
<body style="background-color:#080f15; min-height:100vh; display:flex; flex-direction:column;">
<nav style="background-color:rgb(35,46,46);">
    <ul class="nav nav-tabs w-100">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/empresa/EmpresaDashboard}">
                <i class="fa-solid fa-briefcase" style="color:rgb(10,202,154)"></i>
            </a>
        </li>
        <li class="nav-item"><span class="nav-link fw-bold" style="color:rgb(10,202,154)">Bolsa de Empleo</span></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/empresa/EmpresaDashboard}" style="color:rgb(10,202,154)">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/empresa/MisPuestos}" style="color:rgb(10,202,154)">Mis Puestos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/empresa/PublicarPuesto}" style="color:rgb(10,202,154)">Publicar Puesto</a></li>
        <li class="nav-item ms-auto">
            <span class="nav-link" th:text="${empresa.nombre}" style="color:rgb(10,202,154)"></span>
        </li>
        <li class="nav-item"><a class="nav-link" th:href="@{/empresa/salir}" style="color:rgb(10,202,154)">Salir</a></li>
    </ul>
</nav>
<main class="flex-grow-1">
    <div class="container-fluid px-3 mt-4">
        <div class="d-flex align-items-center mb-3">
            <h5 class="text-white mb-0">Detalle de oferente</h5>
            <a th:href="@{/empresa/BuscarCandidatos(puestoId=${puestoId})}"
               class="btn ms-auto"
               style="background-color:#2e3e3e; color:white;">
                <i class="fa-solid fa-arrow-left me-1"></i> Volver
            </a>
        </div>
        <div class="card mb-3" style="background-color:rgb(35,46,46); border-color:#4a5f5f;">
            <div class="card-body">
                <h6 style="color:rgb(10,202,154)">
                    <span th:text="${oferente.nombre} + ' ' + ${oferente.apellido}"></span>
                </h6>
                <p style="color:#cdd9d9; margin:0;">
                    <strong style="color:#8aa8a8;">Identificación:</strong>
                    <span th:text="${oferente.identificacion}"></span>
                </p>
                <p style="color:#cdd9d9; margin:0;">
                    <strong style="color:#8aa8a8;">Email:</strong>
                    <span th:text="${oferente.usuario.correo}"></span>
                </p>
                <p style="color:#cdd9d9; margin:0;">
                    <strong style="color:#8aa8a8;">Teléfono:</strong>
                    <span th:text="${oferente.telefono}"></span>
                </p>
                <p style="color:#cdd9d9; margin:0;">
                    <strong style="color:#8aa8a8;">Residencia:</strong>
                    <span th:text="${oferente.lugarResidencia}"></span>
                </p>
                <div class="mt-3" th:if="${oferente.cv != null}">
                    <a th:href="@{/empresa/verCV(oferenteId=${oferente.usuario.id})}"
                       class="btn btn-sm" target="_blank"
                       style="background-color:rgb(10,202,154); color:#080f15; font-weight:700;">
                        <i class="fa-solid fa-file-pdf me-1"></i> Ver CV
                    </a>
                </div>
                <div class="mt-3" th:if="${oferente.cv == null}">
                    <span style="color:#8aa8a8; font-size:0.85rem;">Este oferente no ha subido su CV.</span>
                </div>
            </div>
        </div>
        <div class="card" style="background-color:rgb(35,46,46); border-color:#4a5f5f;">
            <div class="card-body">
                <h6 style="color:rgb(10,202,154)" class="mb-3">Habilidades</h6>
                <table class="table table-borderless mb-0" style="color:#cdd9d9; font-size:0.9rem; --bs-table-bg: transparent;">
                    <thead>
                    <tr style="border-bottom:1px solid #4a5f5f;">
                        <th style="color:rgb(10,202,154)">Característica</th>
                        <th class="text-center" style="color:rgb(10,202,154)">Nivel</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="habilidad : ${habilidades}" style="border-bottom:1px solid #2e3e3e;">
                        <td style="color:#cdd9d9;" th:text="${habilidad.caracteristica.nombre}"></td>
                        <td class="text-center" style="color:#cdd9d9;" th:text="${habilidad.nivel}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{presentation/Fragmentos :: footer}"></footer>
</body>
</html>
