<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/Fragmentos :: head('Publicar Puesto')}"></head>
<body style="background-color:#080f15; min-height:100vh; display:flex; flex-direction:column;">
<nav style="background-color:rgb(35,46,46);">
    <ul class="nav nav-tabs w-100">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/empresa/EmpresaDashboard}">
                <i class="fa-solid fa-briefcase" style="color:rgb(10,202,154)"></i>
            </a>
        </li>
        <li class="nav-item"><span class="nav-link fw-bold" style="color:rgb(10,202,154)">Bolsa de Empleo</span></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/empresa/EmpresaDashboard}" style="color:rgb(10,202,154)">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/empresa/MisPuestos}" style="color:rgb(10,202,154)">Mis Puestos</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/empresa/PublicarPuesto}" style="color:rgb(10,202,154)">Publicar Puesto</a></li>
        <li class="nav-item ms-auto">
            <span class="nav-link" th:text="${empresa.nombre}" style="color:rgb(10,202,154)"></span>
        </li>
        <li class="nav-item"><a class="nav-link" th:href="@{/empresa/salir}" style="color:rgb(10,202,154)">Salir</a></li>
    </ul>
</nav>
<main class="flex-grow-1">
    <div class="container-fluid px-3 mt-4">
        <div class="d-flex align-items-center mb-3">
            <h5 class="text-white">Publicar Puesto</h5>
            <a th:href="@{/empresa/MisPuestos}" class="btn ms-auto"
               style="background-color:#2e3e3e; color:white;">
                <i class="fa-solid fa-arrow-left me-1"></i> Volver
            </a>
        </div>
        <div class="card" style="background-color:rgb(35,46,46); border-color:#4a5f5f;">
            <div class="card-body">
                <form th:action="@{/empresa/PublicarPuesto}" method="post">
                    <div class="mb-3">
                        <label class="mb-1 d-block"
                               style="color:#8aa8a8; font-size:0.8rem; text-transform:uppercase;">
                            Descripción del puesto
                        </label>
                        <textarea class="form-control" name="descripcion" rows="3"
                                  style="background-color:#0e1a22; border:1px solid #4a5f5f; color:#cdd9d9;"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="mb-1 d-block"
                               style="color:#8aa8a8; font-size:0.8rem; text-transform:uppercase;">
                            Salario ofrecido (USD)
                        </label>
                        <input type="number" step="0.01" class="form-control" name="salario"
                               style="background-color:#0e1a22; border:1px solid #4a5f5f; color:#cdd9d9;">
                    </div>
                    <div class="mb-3">
                        <label class="mb-1 d-block"
                               style="color:#8aa8a8; font-size:0.8rem; text-transform:uppercase;">
                            Tipo de publicación
                        </label>
                        <select class="form-select" name="esPublico"
                                style="background-color:#0e1a22; border:1px solid #4a5f5f; color:#cdd9d9;">
                            <option value="1">Público</option>
                            <option value="0">Privado</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <h6 style="color:rgb(10,202,154)">Características requeridas</h6>
                        <p style="color:#8aa8a8; font-size:0.8rem;">
                            Ingresá el nivel deseado (1-5) para cada característica que aplique.
                            Dejá en 0 las que no apliquen.
                        </p>
                        <table class="table table-borderless mb-0"
                               style="color:#cdd9d9; font-size:0.9rem; --bs-table-bg: transparent;">
                            <thead>
                            <tr style="border-bottom:1px solid #4a5f5f;">
                                <th style="color:rgb(10,202,154)">Característica</th>
                                <th style="color:rgb(10,202,154); width:150px;">Nivel deseado (0 = no aplica)</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="car : ${caracteristicas}"
                                style="border-bottom:1px solid #2e3e3e;">
                                <td style="color:#cdd9d9;" th:text="${car.nombre}"></td>
                                <td>
                                    <input type="hidden" name="caracteristicaIds" th:value="${car.id}">
                                    <input type="number" name="niveles" min="0" max="5" value="0" class="form-control form-control-sm" style="background-color:#0e1a22; border:1px solid #4a5f5f; color:#cdd9d9; width:80px;">
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="text-end">
                        <button type="submit" class="btn" style="background-color:rgb(10,202,154); color:#080f15; font-weight:700;"><i class="fa-solid fa-check me-1"></i> Publicar Puesto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{presentation/Fragmentos :: footer}"></footer>
</body>
</html>
