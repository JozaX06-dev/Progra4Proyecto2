<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/Fragmentos :: head('Reportes')}"></head>
<body style="background-color:#080f15; min-height:100vh; display:flex; flex-direction:column;">
<nav style="background-color:rgb(35,46,46);">
    <ul class="nav nav-tabs w-100">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/AdminDashboard}">
                <i class="fa-solid fa-briefcase" style="color:rgb(10,202,154)"></i>
            </a>
        </li>
        <li class="nav-item"><span class="nav-link fw-bold" style="color:rgb(10,202,154)">Bolsa de Empleo</span></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/AdminDashboard}" style="color:rgb(10,202,154)">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/EmpresasPendientes}" style="color:rgb(10,202,154)">Empresas Pendientes</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/OferentesPendientes}" style="color:rgb(10,202,154)">Oferentes Pendientes</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/Caracteristicas}" style="color:rgb(10,202,154)">Características</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/admin/Reportes}" style="color:rgb(10,202,154)">Reportes</a></li>
        <li class="nav-item ms-auto">
            <span class="nav-link" th:text="${admin.usuario.correo}" style="color:rgb(10,202,154)"></span>
        </li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/salir}" style="color:rgb(10,202,154)">Salir</a></li>
    </ul>
</nav>
<main class="flex-grow-1">
    <div class="container-fluid px-3 mt-4">
        <h5 class="text-white mb-3">Reportes</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <div class="card h-100" style="background-color:rgb(35,46,46); border-color:#4a5f5f;">
                    <div class="card-body">
                        <h6 style="color:rgb(10,202,154)" class="mb-3">Generar Reporte</h6>
                        <form th:action="@{/admin/Reportes}" method="get">
                            <div class="mb-3">
                                <label class="mb-1 d-block" style="color:#8aa8a8; font-size:0.8rem; text-transform:uppercase;">Año</label>
                                <select name="anio" class="form-select"
                                        style="background-color:#0e1a22; border:1px solid #4a5f5f; color:#cdd9d9;">
                                    <option th:value="${anioActual}" th:text="${anioActual}"></option>
                                    <option th:value="${anioAnterior}" th:text="${anioAnterior}"></option>
                                    <option th:value="${anioAnteAnterior}" th:text="${anioAnteAnterior}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn w-100 mb-2" style="background-color:rgb(10,202,154); color:#080f15; font-weight:700;">
                                <i class="fa-solid fa-eye me-1"></i> Ver reporte
                            </button>
                        </form>
                        <a th:if="${anioSeleccionado != null}"
                           th:href="@{/admin/generarReporte(anio=${anioSeleccionado})}"
                           class="btn w-100"
                           style="background-color:#2e3e3e; color:#cdd9d9; font-weight:700;">
                            <i class="fa-solid fa-file-pdf me-1"></i> Descargar PDF
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card h-100" style="background-color:rgb(35,46,46); border-color:#4a5f5f;">
                    <div class="card-body">
                        <h6 style="color:rgb(10,202,154)" class="mb-3"
                            th:text="'Puestos publicados — ' + (${anioSeleccionado} ?: 'seleccioná un año')">
                        </h6>
                        <div th:if="${porMes == null}">
                            <p style="color:#8aa8a8;">Seleccioná un año y presioná "Ver reporte".</p>
                        </div>
                        <table th:if="${porMes != null}"
                               class="table table-borderless" style="color:#cdd9d9; font-size:0.9rem;">
                            <thead>
                            <tr style="border-bottom:1px solid #4a5f5f;">
                                <th style="color:rgb(10,202,154)">Mes</th>
                                <th style="color:rgb(10,202,154)">Cantidad de puestos</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="entrada : ${porMes.entrySet()}"
                                style="border-bottom:1px solid #2e3e3e;">
                                <td th:text="${entrada.key}"></td>
                                <td th:text="${entrada.value}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{presentation/Fragmentos :: footer}"></footer>
</body>
</html>
