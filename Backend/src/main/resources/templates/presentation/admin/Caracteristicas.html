<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/Fragmentos :: head('Caracteristicas')}"></head>
<body style="background-color:#080f15; min-height:100vh; display:flex; flex-direction:column;">
<nav style="background-color:rgb(35,46,46);">
  <ul class="nav nav-tabs w-100">
    <li class="nav-item">
      <a class="nav-link" th:href="@{/admin/AdminDashboard}">
        <i class="fa-solid fa-briefcase" style="color:rgb(10,202,154)"></i>
      </a>
    </li>
    <li class="nav-item"><span class="nav-link fw-bold" style="color:rgb(10,202,154)">Bolsa de Empleo</span></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/admin/AdminDashboard}" style="color:rgb(10,202,154)">Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/admin/EmpresasPendientes}" style="color:rgb(10,202,154)">Empresas Pendientes</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/admin/OferentesPendientes}" style="color:rgb(10,202,154)">Oferentes Pendientes</a></li>
    <li class="nav-item"><a class="nav-link active" th:href="@{/admin/Caracteristicas}" style="color:rgb(10,202,154)">Características</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/admin/Reportes}" style="color:rgb(10,202,154)">Reportes</a></li>
    <li class="nav-item ms-auto">
      <span class="nav-link" th:text="${admin.usuario.correo}" style="color:rgb(10,202,154)"></span>
    </li>
    <li class="nav-item"><a class="nav-link" th:href="@{/admin/salir}" style="color:rgb(10,202,154)">Salir</a></li>
  </ul>
</nav>
<main class="flex-grow-1">
  <div class="container-fluid px-3 mt-4">
    <h5 class="text-white mb-3">Características</h5>
    <div class="row g-3">
      <div class="col-md-7">
        <div class="card h-100" style="background-color:rgb(35,46,46); border-color:#4a5f5f;">
          <div class="card-body">
            <span style="color:#8aa8a8; font-size:0.8rem;">Ruta:</span>
            <div class="mt-1 mb-3">
              <a th:href="@{/admin/Caracteristicas}"
                 style="background-color:rgba(10,202,154,0.18); color:rgb(10,202,154); border:1px solid rgba(10,202,154,0.35); padding:2px 10px; border-radius:4px; font-size:0.8rem; text-decoration:none;">
                Raíces
              </a>
              <span th:if="${padre != null}" style="color:#8aa8a8"> / </span>
              <span th:if="${padre != null}" th:text="${padre.nombre}" style="background-color:rgba(10,202,154,0.18); color:rgb(10,202,154); border:1px solid rgba(10,202,154,0.35); padding:2px 10px; border-radius:4px; font-size:0.8rem;"></span>
            </div>
            <div style="color:#8aa8a8; font-size:0.8rem;" class="mb-2">Categorías</div>
            <ul style="list-style:none; padding:0; margin:0;">
              <li th:each="car : ${caracteristicas}"
                  class="d-flex justify-content-between align-items-center py-2"
                  style="border-bottom:1px solid #2e3e3e; color:#cdd9d9;">
                <span th:text="${car.nombre}"></span>
                <a th:if="${tieneHijos[car.id]}"
                   th:href="@{/admin/Caracteristicas/hijos/{id}(id=${car.id})}"
                   style="background:transparent; border:1px solid #4a5f5f; color:#8aa8a8; padding:2px 10px; border-radius:4px; text-decoration:none; font-size:0.85rem;">
                  Entrar
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
      <div class="col-md-5">
        <div class="card h-100" style="background-color:rgb(35,46,46); border-color:#4a5f5f;">
          <div class="card-body">
            <h6 style="color:rgb(10,202,154)" class="mb-3">Agregar Característica</h6>
            <form th:action="@{/admin/crearCaracteristica}" method="post">
              <div class="mb-3">
                <label class="mb-1 d-block" style="color:#8aa8a8; font-size:0.8rem;">Nombre</label>
                <input type="text" name="nombre" class="form-control" style="background-color:#0e1a22; border:1px solid #4a5f5f; color:#cdd9d9;">
              </div>
              <div class="mb-3">
                <label class="mb-1 d-block" style="color:#8aa8a8; font-size:0.8rem;">Padre</label>
                <select name="padreId" class="form-select"
                        style="background-color:#0e1a22; border:1px solid #4a5f5f; color:#cdd9d9;">
                  <option value="">Sin padre (raíz)</option>
                  <option th:each="car : ${todasCaracteristicas}"
                          th:value="${car.id}"
                          th:text="${car.nombre}">
                  </option>
                </select>
              </div>
              <button type="submit" class="btn" style="background-color:rgb(10,202,154); color:#080f15; font-weight:700;">
                <i class="fa-solid fa-plus me-1"></i> Crear
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<footer th:replace="~{presentation/Fragmentos :: footer}"></footer>
</body>
</html>
