<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/Fragmentos :: head('Registro Empresa')}"></head>
    <body style="background-color: #080f15; min-height: 100vh; display: flex; flex-direction: column;">
        <nav style="background-color: rgb(35, 46, 46);">
            <ul class="nav nav-tabs w-100">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">
                    <i class="fa-solid fa-briefcase" style="color:rgb(10, 202, 154)"></i>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}" style="color:rgb(10, 202, 154)">Bolsa de Empleo</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/buscarPuestos}" style="color:rgb(10, 202, 154)">Buscar Puestos</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" aria-current="page" th:href="@{/registroEmpresa}" style="color:rgb(10, 202, 154)">Registro Empresa</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/registroOferente}" style="color:rgb(10, 202, 154)">Registro Oferente</a>
            </li>
            <li class="nav-item ms-auto">
                <a class="nav-link" th:href="@{/login}" style="color:rgb(10, 202, 154)">Login</a>
            </li>
            </ul>
        </nav>
        <main class="flex-grow-1 d-flex align-items-center justify-content-center">
            <div class="my-4" style="width: 350px;">
                <div class="card" style="background-color: rgb(35,46,46); border-color: #4a5f5f;">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <i class="fa-solid fa-user-check" style="color:rgb(10,202,154)"></i>
                            <h4 class="mt-2" style="color:rgb(10,202,154)">Registro Empresa</h4>
                        </div>
                        <form th:action="@{/registroEmpresa}" method="post">
                            <div class="mb-3">
                                <label for="nombreEmpresa" class="form-label" style="color:rgb(10,202,154)">Nombre Empresa</label>
                                <input type="text" class="form-control" id="nombreEmpresa" name="nombre">
                            </div>
                            <!--El class mb-3 lo que hace es agregar un margen inferior, trabaja con números del 0 al 5-->
                            <div class="mb-3">
                                <label for="correoEmpresa" class="form-label" style="color:rgb(10,202,154)">Correo Empresa</label>
                                <input type="email" class="form-control" id="correoEmpresa" name="correo">
                            </div>
                            <div class="mb-3">
                                <label for="localizacion" class="form-label" style="color:rgb(10,202,154)">Localización</label>
                                <input type="text" class="form-control" id="localizacion" name="localizacion">
                            </div>
                            <div class="mb-3">
                                <label for="telefono" class="form-label" style="color:rgb(10,202,154)">Telefono/Celular</label>
                                <input type="number" class="form-control" min="8" id="telefono" name="telefono">
                            </div>
                            <div class="mb-3">
                                <label for="descripcion" class="form-label" style="color:rgb(10,202,154)">Descripción</label>
                                <textarea class="form-control" id="descripcion" name="descripcion" rows="3"></textarea>
                            </div>
                            <div class="text-center">
                                <button type="submit" class="btn px-4" style="background-color:rgb(10,202,154); color:#080f15; font-weight:600;">Ingresar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{presentation/Fragmentos :: footer}"></footer>
        </body>
</html>
