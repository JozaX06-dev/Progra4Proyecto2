<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/Fragmentos :: head('Menu Parte Publica')}"></head>
    <body style="background-color: #080f15; min-height: 100vh; display: flex; flex-direction: column;">
        <nav style="background-color: rgb(35, 46, 46);">
            <ul class="nav nav-tabs w-100">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">
                    <i class="fa-solid fa-briefcase" style="color:rgb(10, 202, 154)"></i>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" aria-current="page" th:href="@{/}" style="color:rgb(10, 202, 154)">Bolsa de Empleo</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/buscarPuestos}" style="color:rgb(10, 202, 154)">Buscar Puestos</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/registroEmpresa}" style="color:rgb(10, 202, 154)">Registro Empresa</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/registroOferente}" style="color:rgb(10, 202, 154)">Registro Oferente</a>
            </li>
            <li class="nav-item ms-auto">
                <a class="nav-link" th:href="@{/login}" style="color:rgb(10, 202, 154)">Login</a>
            </li>
            </ul>
        </nav>
        <!-- Menú donde se muestran las 5 empresas -->
        <main class="flex-grow-1">
            <div class="container mt-4">
                <h3 class="text-white">Bolsa de Empleo</h3>
                <h5 class="text-white-50">Últimos 5 puestos públicos</h5>
                <div class="row row-cols-1 row-cols-md-3 g-4 mt-2">
                    <div th:each="puesto : ${puestos}" class="col">
                        <div class="card h-100" style="background-color: rgb(35,46,46); border-color:#4a5f5f;">
                            <div class="card-body">
                                <h5 th:text="${puesto.empresa.nombre}" style="color:rgb(10,202,154)">Nombre de empresa</h5>
                                <p class="card-text text-white" th:text="${puesto.descripcion}">Descripcion</p>
                                <p class="card-text" style="color:#cdd9d9">
                                    $ <span th:text="${puesto.salario}"></span> USD
                                </p>
                                <p class="card-text" style="color:#8aa8a8; font-size:0.9rem;">
                                    ₡ <span th:text="${#numbers.formatDecimal(puesto.salario * tipoCambio, 0, 'COMMA', 0, 'POINT')}"></span> CRC
                                </p>
                                <button type="button" class="btn btn-sm" style="background-color:rgb(10,202,154); color:#080f15; font-weight:700;"
                                        data-bs-toggle="popover"
                                        th:attr="data-bs-title=${puesto.descripcion}, data-bs-content=${puesto.descripcion}">
                                    Ver Detalles
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{presentation/Fragmentos :: footer}"></footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script>const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]') 
        const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl))</script>
    </body>
</html>
