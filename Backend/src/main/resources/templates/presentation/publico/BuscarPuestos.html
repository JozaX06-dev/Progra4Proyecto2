<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/Fragmentos :: head('Buscar Puestos')}"></head>
    <body style="background-color: #080f15; min-height: 100vh; display: flex; flex-direction: column;">
    <nav style="background-color: rgb(35, 46, 46);">
        <ul class="nav nav-tabs w-100">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">
                    <i class="fa-solid fa-briefcase" style="color:rgb(10, 202, 154)"></i>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}" style="color:rgb(10, 202, 154)">Bolsa de Empleo</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" aria-current="page" th:href="@{/buscarPuestos}" style="color:rgb(10, 202, 154)">Buscar Puestos</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/registroEmpresa}" style="color:rgb(10, 202, 154)">Registro Empresa</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/registroOferente}" style="color:rgb(10, 202, 154)">Registro Oferente</a>
            </li>
            <li class="nav-item ms-auto">
                <a class="nav-link" th:href="@{/login}" style="color:rgb(10, 202, 154)">Login</a>
            </li>
        </ul>
    </nav>
    <main class="flex-grow-1">
        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-md-12">
                    <div class="card" style="background-color: rgb(35,46,46); border-color: #4a5f5f;">
                        <div class="card-header fw-bold text-white" style="background-color: rgb(25,35,35);">
                            Buscar puestos por características
                        </div>
                        <form th:action="@{/buscarPuestos}" method="post">
                            <div class="card-body">
                                <div th:each="car : ${caracteristicas}">
                                    <div th:if="${tieneHijos[car.id]}"
                                         class="mt-2 mb-1 fw-bold"
                                         th:style="'color:rgb(10,202,154); margin-left:' + ${niveles[car.id] * 20} + 'px'"
                                         th:text="${car.nombre}"></div>
                                    <div th:if="${!tieneHijos[car.id]}" class="form-check"
                                         th:style="'margin-left:' + ${niveles[car.id] * 20} + 'px'">
                                        <input class="form-check-input" type="checkbox" name="caracteristicasIds"
                                               th:value="${car.id}"
                                               th:id="'car'+${car.id}"
                                               th:checked="${seleccionados != null && seleccionados.contains(car.id)}">
                                        <label class="form-check-label text-white" th:for="'car'+${car.id}" th:text="${car.nombre}"></label>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer" style="background-color: rgb(25,35,35); border-color: #4a5f5f;">
                                <button type="submit" class="btn px-4" style="background-color:rgb(10,202,154); color:#080f15; font-weight:600;">Buscar</button>
                                <a th:href="@{/buscarPuestos}" class="btn px-4" style="background-color:#2e3e3e; color:#cdd9d9; font-weight:600;">Limpiar</a>
                            </div>
                        </form>
                    </div>
                    <div class="card mt-4 mb-4" style="background-color: rgb(35,46,46); border-color: #4a5f5f;">
                        <div class="card-header fw-bold text-white" style="background-color: rgb(25,35,35);">
                            Resultados de búsqueda
                        </div>
                        <div class="card-body">
                            <div th:if="${resultados == null}">
                                <p style="color:#8aa8a8;">Seleccioná características y presioná Buscar.</p>
                            </div>
                            <div th:if="${resultados != null and #lists.isEmpty(resultados)}">
                                <p style="color:#8aa8a8;">No se encontraron puestos.</p>
                            </div>
                            <div th:each="puesto : ${resultados}" class="mb-3 pb-3" style="border-bottom:1px solid #4a5f5f;">
                                <h5 style="color:rgb(10,202,154)" th:text="${puesto.empresa.nombre}"></h5>
                                <p style="color:#cdd9d9; margin:0;" th:text="${puesto.descripcion}"></p>
                                <p style="color:#8aa8a8;">Salario: $ <span th:text="${puesto.salario}"></span> USD — ₡ <span th:text="${#numbers.formatDecimal(puesto.salario * tipoCambio, 0, 'COMMA', 0, 'POINT')}"></span> CRC
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{presentation/Fragmentos :: footer}"></footer>
    </body>
</html>
