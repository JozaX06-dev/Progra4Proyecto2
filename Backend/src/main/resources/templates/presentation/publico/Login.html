<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/Fragmentos :: head('Login')}"></head>
    <body style="background-color: #080f15; min-height: 100vh; display: flex; flex-direction: column;">
        <!-- Navegador -->
        <nav style="background-color: rgb(35, 46, 46);">
            <ul class="nav nav-tabs w-100">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}">
                    <i class="fa-solid fa-briefcase" style="color:rgb(10, 202, 154)"></i>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/}" style="color:rgb(10, 202, 154)">Bolsa de Empleo</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/buscarPuestos}" style="color:rgb(10, 202, 154)">Buscar Puestos</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/registroEmpresa}" style="color:rgb(10, 202, 154)">Registro Empresa</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/registroOferente}" style="color:rgb(10, 202, 154)">Registro Oferente</a>
            </li>
            <li class="nav-item ms-auto">
                <a class="nav-link active" aria-current="page" th:href="@{/login}" style="color:rgb(10, 202, 154)">Login</a>
            </li>
            </ul>
        </nav>
        <main class="flex-grow-1 d-flex align-items-center justify-content-center">
            <div style="width: 350px;">
                <div class="card" style="background-color: rgb(35,46,46); border-color: #4a5f5f;">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <i class="fa-solid fa-user-check" style="color:rgb(10,202,154)"></i>
                            <h4 class="mt-2" style="color:rgb(10,202,154)">Login</h4>
                        </div>
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="exampleInputEmail1" class="form-label" style="color:rgb(10,202,154)">Correo Usuario</label>
                                <input type="email" class="form-control" id="exampleInputEmail1" name="correo">
                            </div>
                            <!--El class mb-3 lo que hace es agregar un margen inferior, trabaja con números del 0 al 5-->
                            <div class="mb-3">
                                <label for="exampleInputPassword1" class="form-label" style="color:rgb(10,202,154)">Contraseña</label>
                                <input type="password" class="form-control" id="exampleInputPassword1" name="clave">
                            </div>
                            <div class="text-center">
                                <!--Tenemos que cambiar este botón a submit luego-->
                                <button type="submit" class="btn px-4" style="background-color:rgb(10,202,154); color:#080f15; font-weight:600;">Ingresar</button>
                            </div>
                            <br>
                            <br>
                            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                                Correo o contraseña incorrectos.
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{presentation/Fragmentos :: footer}"></footer>
        </body>
</html>
